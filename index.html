<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>n8n Chat</title>

<style>
body{
font-family:Arial;
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat{
width:400px;
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
height:500px;
}

.messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
margin-bottom:10px;
padding:8px 12px;
border-radius:8px;
max-width:75%;
}

.user{
background:#4a6cf7;
color:white;
margin-left:auto;
}

.bot{
background:#e5e5e5;
}

.input{
display:flex;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
background:#4a6cf7;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
<input id="question" placeholder="Ask something">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const webhook = "https://n8n-practicehiro.onrender.com/webhook-test/06ef96d0-34f7-4886-85fd-8516ec825f62";

function addMessage(text, type){
const msg = document.createElement("div");
msg.className = "msg " + type;
msg.innerText = text;

const box = document.getElementById("messages");
box.appendChild(msg);
box.scrollTop = box.scrollHeight;
}

async function send(){

const question = document.getElementById("question").value;
const responseBox = document.getElementById("messages");

if(!question) return;

addMessage(question,"user");

document.getElementById("question").value = "";

const loading = document.createElement("div");
loading.className = "msg bot";
loading.innerText = "Loading...";
responseBox.appendChild(loading);

try{

const res = await fetch(webhook,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ message: question })
});

const text = await res.text();

let reply = text;

try{
const data = JSON.parse(text);
reply = data[0]?.output || data.reply || text;
}catch{}

loading.innerText = reply;

}catch(err){

loading.innerText = "Error: " + err.message;

}

}

document.getElementById("question").addEventListener("keypress",function(e){
if(e.key==="Enter") send();
});

</script>

</body>
</html>
