<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple n8n Chat</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:400px;
    height:550px;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
}

.chat-header{
    background:#4a6cf7;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
    border-radius:10px 10px 0 0;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.message{
    margin-bottom:10px;
    padding:8px 12px;
    border-radius:8px;
    max-width:75%;
}

.user{
    background:#4a6cf7;
    color:white;
    margin-left:auto;
}

.bot{
    background:#e5e5e5;
}

.input-area{
    display:flex;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    background:#4a6cf7;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#3b58d6;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
n8n Chat
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
<input id="messageInput" type="text" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const webhook = "https://n8n-practicehiro.onrender.com/webhook-test/06ef96d0-34f7-4886-85fd-8516ec825f62";

function addMessage(text, className){
    const msg = document.createElement("div");
    msg.className = "message " + className;
    msg.innerText = text;

    document.getElementById("chatBox").appendChild(msg);
    document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
}

async function sendMessage(){

    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if(!message) return;

    addMessage(message,"user");
    input.value = "";

    try{

        const response = await fetch(webhook,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();

        addMessage(data.reply || JSON.stringify(data),"bot");

    }catch(error){

        addMessage("Error contacting webhook","bot");

    }

}

document.getElementById("messageInput").addEventListener("keypress",function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
